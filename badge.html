<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor Her · Your Ticket</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #140928;
        --bg-2: #271246;
        --purple-1: #3f1f8e;
        --purple-2: #5e30b8;
        --purple-3: #7a42d2;
        --gold: #c9a84c;
        --gold-soft: #f5cb52;
        --text: #fffdf8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 26px 16px;
        gap: 24px;
        background: radial-gradient(
            circle at 52% 16%,
            rgba(167, 105, 255, 0.22) 0%,
            transparent 28%
          ),
          radial-gradient(
            circle at 24% 80%,
            rgba(112, 31, 208, 0.18) 0%,
            transparent 30%
          ),
          linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, #140928 100%);
        color: var(--text);
        font-family: "Jost", sans-serif;
      }

      .name-step {
        width: min(380px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .name-step p {
        font-size: 0.74rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
      }

      .name-input-wrap {
        width: 100%;
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(201, 168, 76, 0.45);
        padding: 0 2px 9px;
        transition: border-color 0.2s ease;
      }

      .name-input-wrap:focus-within {
        border-color: var(--gold);
      }

      #nameInput {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: #fff;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.72rem;
        letter-spacing: 0.05em;
      }

      #nameInput::placeholder {
        color: rgba(255, 255, 255, 0.24);
      }

      .gen-btn {
        width: 100%;
        border: 1px solid var(--gold);
        background: transparent;
        color: var(--gold);
        cursor: pointer;
        padding: 12px 16px;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .gen-btn:hover {
        background: var(--gold);
        color: #1b0e35;
      }

      #ticketWrap {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #ticketWrap.visible {
        display: flex;
      }

      #ticket {
        position: relative;
        width: min(340px, 100%);
        aspect-ratio: 3 / 4;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(201, 168, 76, 0.44);
        background: linear-gradient(
          145deg,
          var(--purple-1) 0%,
          var(--purple-2) 42%,
          var(--purple-3) 72%,
          #6840bf 100%
        );
        box-shadow: 0 12px 38px rgba(20, 9, 40, 0.42);
      }

      #ticket::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            ellipse at 62% 28%,
            rgba(190, 140, 255, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 30% 80%,
            rgba(95, 45, 180, 0.16) 0%,
            transparent 62%
          );
        pointer-events: none;
      }

      .ticket-frame {
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(201, 168, 76, 0.42);
        border-radius: 10px;
        pointer-events: none;
      }

      .corner {
        position: absolute;
        width: 10px;
        height: 10px;
        border: 1px solid var(--gold);
        transform: rotate(45deg);
        opacity: 0.85;
        pointer-events: none;
      }

      .corner.tl {
        top: 22px;
        left: 22px;
      }
      .corner.tr {
        top: 22px;
        right: 22px;
      }
      .corner.bl {
        bottom: 22px;
        left: 22px;
      }
      .corner.br {
        bottom: 22px;
        right: 22px;
      }

      .ticket-inner {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 38px 28px 30px;
      }

      .ticket-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.75rem, 7vw, 3.2rem);
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--gold);
        text-align: center;
      }

      .ticket-date {
        margin-top: 0.9rem;
        font-size: 0.66rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(212, 170, 80, 0.82);
        text-align: center;
      }

      .ticket-divider {
        width: 42px;
        height: 1px;
        margin: 1.35rem 0;
        background: rgba(212, 170, 80, 0.36);
      }

      .ticket-greeting {
        display: none;
      }

      .ticket-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        line-height: 1.12;
        letter-spacing: 0.05em;
        color: #fff;
        text-align: center;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.12);
        max-width: 100%;
        word-break: break-word;
        padding: 0 6px;
      }

      .ticket-spacer {
        flex: 1;
      }

      .ticket-bottom {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 22px;
      }

      .ticket-line {
        display: none;
      }

      .ticket-badge {
        position: relative;
        padding: 0.72rem 1.68rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 214, 77, 0.72);
        background: rgba(255, 214, 77, 0.05);
        color: var(--gold-soft);
        font-size: 0.92rem;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        text-align: center;
        box-shadow: 0 0 0 1px rgba(255, 214, 77, 0.1),
          0 0 10px rgba(255, 214, 77, 0.16), 0 0 26px rgba(255, 214, 77, 0.11);
        animation: softShine 3.6s ease-in-out infinite;
      }

      .ticket-badge::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: inherit;
        border: 1px solid rgba(255, 214, 77, 0.18);
        pointer-events: none;
      }

      .ticket-badge::after {
        content: none;
      }

      .ticket-title::after {
        content: none;
      }

      @keyframes softShine {
        0%,
        100% {
          box-shadow: 0 0 0 1px rgba(255, 214, 77, 0.1),
            0 0 10px rgba(255, 214, 77, 0.16), 0 0 26px rgba(255, 214, 77, 0.11);
        }
        50% {
          box-shadow: 0 0 0 1px rgba(255, 214, 77, 0.16),
            0 0 16px rgba(255, 214, 77, 0.24), 0 0 34px rgba(255, 214, 77, 0.16);
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      .bottom-rect {
        display: none;
      }

      .ticket-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .action-btn {
        padding: 11px 18px;
        border-radius: 0;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.67rem;
        font-family: "Jost", sans-serif;
        transition: all 0.2s ease;
      }

      .btn-download {
        background: var(--gold);
        color: #150a2b;
        border: 1px solid var(--gold);
      }

      .btn-download:hover {
        background: #c49a3a;
        border-color: #c49a3a;
      }

      .btn-reset {
        background: transparent;
        color: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .btn-reset:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.42);
      }

      .hint {
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.32);
        text-align: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 16px;
        }

        #ticket {
          width: min(100%, 340px);
        }

        .ticket-title {
          font-size: clamp(2.4rem, 14vw, 2.9rem);
        }

        .ticket-name {
          font-size: 1.82rem;
        }

        .ticket-badge {
          font-size: 0.84rem;
          letter-spacing: 0.22em;
          padding: 0.66rem 1.35rem;
        }

        .ticket-actions {
          width: min(340px, 100%);
        }

        .action-btn {
          flex: 1 1 150px;
        }
      }
    </style>
  </head>
  <body>
    <div class="name-step" id="nameStep">
      <p>Enter your name to generate your ticket</p>
      <div class="name-input-wrap">
        <input
          type="text"
          id="nameInput"
          placeholder="Your full name"
          maxlength="28"
          autocomplete="off"
        />
      </div>
      <button class="gen-btn" id="generateBtn">Generate My Ticket</button>
    </div>

    <div id="ticketWrap">
      <div id="ticket" aria-label="AnchorHer personalized ticket">
        <div class="ticket-frame"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="ticket-inner">
          <div class="ticket-title">Anchor Her</div>
          <div class="ticket-date">17th of July 2026</div>
          <div class="ticket-divider"></div>
          <div class="ticket-name" id="ticketName">-</div>
          <div class="ticket-spacer"></div>
          <div class="ticket-bottom">
            <div class="ticket-badge">Attending</div>
          </div>
        </div>

        <div class="bottom-rect left"></div>
        <div class="bottom-rect right"></div>
      </div>

      <div class="ticket-actions">
        <button class="action-btn btn-download" id="downloadBtn">
          Download Ticket
        </button>
        <button class="action-btn btn-reset" id="resetBtn">Start Over</button>
      </div>
      <p class="hint">Save the image and share it</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      const nameInput = document.getElementById("nameInput");
      const generateBtn = document.getElementById("generateBtn");
      const nameStep = document.getElementById("nameStep");
      const ticketWrap = document.getElementById("ticketWrap");
      const ticketName = document.getElementById("ticketName");
      const downloadBtn = document.getElementById("downloadBtn");
      const resetBtn = document.getElementById("resetBtn");

      function generateTicket() {
        const value = nameInput.value.trim();
        if (!value) {
          nameInput.focus();
          return;
        }
        ticketName.textContent = value;
        nameStep.style.display = "none";
        ticketWrap.classList.add("visible");
      }

      generateBtn.addEventListener("click", generateTicket);
      nameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          generateTicket();
        }
      });

      resetBtn.addEventListener("click", () => {
        ticketWrap.classList.remove("visible");
        nameStep.style.display = "flex";
        nameInput.value = "";
        nameInput.focus();
        ticketName.textContent = "-";
      });

      downloadBtn.addEventListener("click", () => {
        const ticket = document.getElementById("ticket");
        html2canvas(ticket, {
          scale: 3,
          useCORS: true,
          backgroundColor: null,
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = "anchor-her-ticket.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      });
    </script>
  </body>
</html>
